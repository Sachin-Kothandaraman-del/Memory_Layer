<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>memlayer</title>
<style>
:root {
  --bg:#f5f6fa; --card:#ffffff; --text:#1b1e28; --muted:#69707f;
  --border:#e4e6ee; --accent:#6051e8; --accent-text:#ffffff;
  --accent-soft:#edebfd; --green:#1a9e6e; --amber:#b97a0e; --red:#d23b4e;
  --chip-sem:#6051e8; --chip-epi:#0e7fb9; --chip-ins:#b0258d;
  --shadow:0 1px 3px rgba(20,22,40,.07);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:#0e1016; --card:#171a23; --text:#e8eaf2; --muted:#98a0b3;
    --border:#272b38; --accent:#8a7cf6; --accent-text:#15131f;
    --accent-soft:#272145; --green:#3ecf96; --amber:#e3a93e; --red:#f0697a;
    --chip-sem:#a89bff; --chip-epi:#5fb9e8; --chip-ins:#f08ad2;
    --shadow:0 1px 3px rgba(0,0,0,.35);
  }
}
* { box-sizing:border-box; margin:0; }
body {
  background:var(--bg); color:var(--text); font:15px/1.5 -apple-system,
  "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
}
header {
  position:sticky; top:0; z-index:10; display:flex; align-items:center;
  gap:14px; padding:12px 22px; background:var(--card);
  border-bottom:1px solid var(--border);
}
.brand { font-size:18px; font-weight:700; letter-spacing:.2px; }
.brand span { color:var(--accent); }
.badge {
  font-size:12px; padding:3px 10px; border-radius:999px;
  border:1px solid var(--border); color:var(--muted); white-space:nowrap;
}
.badge.ok { color:var(--green); border-color:var(--green); }
.badge.warn { color:var(--amber); border-color:var(--amber); }
.spacer { flex:1; }
.userbox { display:flex; align-items:center; gap:6px; font-size:13px; color:var(--muted); }
.userbox input {
  width:130px; padding:5px 9px; border-radius:8px; border:1px solid var(--border);
  background:var(--bg); color:var(--text); font-size:13px;
}
nav { display:flex; gap:6px; padding:14px 22px 0; max-width:920px; margin:0 auto; }
nav button {
  padding:7px 16px; border-radius:999px; border:1px solid var(--border);
  background:var(--card); color:var(--muted); font-size:14px; cursor:pointer;
}
nav button.active { background:var(--accent); border-color:var(--accent);
  color:var(--accent-text); font-weight:600; }
main { max-width:920px; margin:0 auto; padding:18px 22px 60px; }
section { display:none; } section.active { display:block; }
.card {
  background:var(--card); border:1px solid var(--border); border-radius:14px;
  padding:16px; box-shadow:var(--shadow);
}
/* ---- chat ---- */
#chat-log { display:flex; flex-direction:column; gap:10px; min-height:300px;
  max-height:58vh; overflow-y:auto; padding:4px 2px 10px; }
.msg { max-width:78%; padding:10px 14px; border-radius:14px; white-space:pre-wrap;
  overflow-wrap:break-word; }
.msg.user { align-self:flex-end; background:var(--accent); color:var(--accent-text);
  border-bottom-right-radius:4px; }
.msg.agent { align-self:flex-start; background:var(--card);
  border:1px solid var(--border); border-bottom-left-radius:4px; }
.msg.typing { color:var(--muted); font-style:italic; }
details.recall { align-self:flex-start; max-width:88%; font-size:12.5px;
  color:var(--muted); margin-top:-4px; }
details.recall summary { cursor:pointer; user-select:none; }
.recall-item { display:flex; gap:8px; align-items:baseline; padding:6px 10px;
  margin-top:4px; border-radius:8px; background:var(--accent-soft);
  color:var(--text); font-size:12.5px; }
.recall-item .scores { color:var(--muted); font:11px Consolas, monospace;
  white-space:nowrap; }
/* ---- common bits ---- */
.chatbar { display:flex; gap:8px; margin-top:12px; }
.chatbar input { flex:1; padding:11px 14px; border-radius:12px;
  border:1px solid var(--border); background:var(--card); color:var(--text);
  font-size:15px; }
.btn {
  padding:10px 18px; border-radius:12px; border:none; background:var(--accent);
  color:var(--accent-text); font-size:14px; font-weight:600; cursor:pointer;
}
.btn:disabled { opacity:.5; cursor:default; }
.btn.ghost { background:transparent; border:1px solid var(--border);
  color:var(--muted); font-weight:500; }
.btn.danger { background:transparent; border:1px solid var(--red); color:var(--red); }
/* ---- memories ---- */
.toolbar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; align-items:center; }
.toolbar input[type=search] { flex:1; min-width:180px; padding:9px 13px;
  border-radius:10px; border:1px solid var(--border); background:var(--card);
  color:var(--text); font-size:14px; }
.toolbar select { padding:9px 10px; border-radius:10px; border:1px solid var(--border);
  background:var(--card); color:var(--text); font-size:14px; }
.toolbar label { font-size:12.5px; color:var(--muted); display:flex; gap:5px;
  align-items:center; white-space:nowrap; }
.mode-note { font-size:12.5px; color:var(--muted); margin:0 2px 10px; }
.mem { display:flex; gap:12px; align-items:flex-start; padding:13px 14px;
  background:var(--card); border:1px solid var(--border); border-radius:12px;
  margin-bottom:8px; cursor:pointer; }
.mem:hover { border-color:var(--accent); }
.mem.superseded { opacity:.55; }
.mem .body { flex:1; min-width:0; }
.mem .content { overflow-wrap:break-word; }
.mem .meta { display:flex; gap:8px; align-items:center; flex-wrap:wrap;
  margin-top:6px; font-size:12px; color:var(--muted); }
.chip { font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px;
  letter-spacing:.4px; text-transform:uppercase; }
.chip.semantic { color:var(--chip-sem); background:var(--accent-soft); }
.chip.episodic { color:var(--chip-epi); background:color-mix(in srgb, var(--chip-epi) 13%, transparent); }
.chip.insight { color:var(--chip-ins); background:color-mix(in srgb, var(--chip-ins) 13%, transparent); }
.chip.old { color:var(--amber); background:color-mix(in srgb, var(--amber) 13%, transparent); text-transform:none; }
.chip.cat { color:var(--muted); background:transparent; border:1px solid var(--border);
  text-transform:none; font-weight:500; }
.bar { width:46px; height:5px; border-radius:3px; background:var(--border);
  overflow:hidden; flex:none; }
.bar i { display:block; height:100%; background:var(--accent); }
.bar.ret i { background:var(--green); }
.score { font-size:12px; color:var(--green); font-weight:600; white-space:nowrap; }
.del { border:none; background:none; color:var(--muted); font-size:16px;
  cursor:pointer; padding:2px 6px; border-radius:6px; flex:none; }
.del:hover { color:var(--red); background:color-mix(in srgb, var(--red) 12%, transparent); }
.empty { text-align:center; color:var(--muted); padding:40px 10px; }
/* ---- add ---- */
#add-text { width:100%; min-height:110px; padding:12px 14px; border-radius:12px;
  border:1px solid var(--border); background:var(--card); color:var(--text);
  font:15px/1.5 inherit; resize:vertical; }
.add-row { display:flex; gap:12px; align-items:center; margin-top:10px; flex-wrap:wrap; }
.add-row label { font-size:13.5px; color:var(--muted); display:flex; gap:6px;
  align-items:center; }
#add-result { margin-top:14px; display:none; }
h4.sub { font-size:13px; color:var(--muted); margin:14px 0 8px;
  text-transform:uppercase; letter-spacing:.5px; }
.fact { padding:8px 12px; border-left:3px solid var(--accent);
  background:var(--accent-soft); border-radius:0 10px 10px 0; margin-bottom:6px;
  font-size:14px; }
.fact .action { font-size:11.5px; color:var(--muted); }
/* ---- activity ---- */
.audit-row { display:flex; gap:10px; padding:9px 12px; border-bottom:1px solid var(--border);
  font-size:13.5px; align-items:baseline; }
.audit-row:last-child { border-bottom:none; }
.audit-row .when { color:var(--muted); font-size:12px; white-space:nowrap; width:78px; flex:none; }
.audit-action { font-size:11px; font-weight:700; padding:1px 8px; border-radius:999px;
  letter-spacing:.4px; flex:none; }
.audit-action.ADD, .audit-action.REFLECT { color:var(--green);
  background:color-mix(in srgb, var(--green) 13%, transparent); }
.audit-action.UPDATE, .audit-action.NONE { color:var(--accent); background:var(--accent-soft); }
.audit-action.RETRACT, .audit-action.FORGET, .audit-action.CLEAR,
.audit-action.PRUNE { color:var(--red);
  background:color-mix(in srgb, var(--red) 12%, transparent); }
.audit-action.REDACT, .audit-action.SKIPPED_PRIVATE { color:var(--amber);
  background:color-mix(in srgb, var(--amber) 13%, transparent); }
.audit-row .why { color:var(--muted); }
/* ---- drawer ---- */
#overlay { position:fixed; inset:0; background:rgba(10,10,20,.45); z-index:40;
  display:none; }
#drawer { position:fixed; top:0; right:0; bottom:0; width:min(540px, 92vw);
  background:var(--card); border-left:1px solid var(--border); z-index:41;
  display:none; flex-direction:column; box-shadow:-8px 0 30px rgba(0,0,0,.15); }
#drawer.open, #overlay.open { display:flex; }
#overlay.open { display:block; }
#drawer .head { display:flex; align-items:center; gap:10px; padding:14px 18px;
  border-bottom:1px solid var(--border); }
#drawer .head .title { font-weight:700; }
#drawer .scroll { overflow-y:auto; padding:16px 18px 30px; }
.version { padding:9px 12px; border-radius:10px; border:1px solid var(--border);
  margin-bottom:6px; font-size:13.5px; }
.version.current { border-color:var(--green); }
.version .tag { font-size:11px; color:var(--muted); }
.src { padding:8px 12px; border-radius:10px; background:var(--bg);
  margin-bottom:6px; font-size:13px; color:var(--muted); }
/* ---- toast ---- */
#toast { position:fixed; left:50%; bottom:26px; transform:translateX(-50%);
  max-width:600px; width:calc(100% - 40px); background:var(--card);
  border:1px solid var(--red); color:var(--text); padding:13px 16px;
  border-radius:12px; box-shadow:var(--shadow); display:none; z-index:50;
  font-size:13px; white-space:pre-wrap; max-height:40vh; overflow:auto; }
#toast.show { display:block; }
#toast.info { border-color:var(--green); }
</style>
</head>
<body>

<header>
  <div class="brand">🧠 mem<span>layer</span></div>
  <span class="badge" id="db-badge">…</span>
  <span class="badge" id="key-badge">…</span>
  <div class="spacer"></div>
  <div class="userbox">user
    <input id="user-input" list="user-list" value="default" spellcheck="false">
    <datalist id="user-list"></datalist>
  </div>
</header>

<nav>
  <button data-tab="chat" class="active">Chat</button>
  <button data-tab="memories">Memories <span id="mem-count"></span></button>
  <button data-tab="add">Add memory</button>
  <button data-tab="activity">Activity</button>
</nav>

<main>
  <section id="tab-chat" class="active">
    <div class="card">
      <div id="chat-log">
        <div class="empty" id="chat-empty">Say hello — the agent recalls what it
          knows about this user, and remembers what you tell it.</div>
      </div>
      <div class="chatbar">
        <input id="chat-input" placeholder="Message the agent…" autocomplete="off">
        <button class="btn" id="chat-send">Send</button>
      </div>
    </div>
  </section>

  <section id="tab-memories">
    <div class="toolbar">
      <input type="search" id="search-input" placeholder="Search memories (hybrid: meaning + keywords)…">
      <select id="type-filter">
        <option value="">All types</option>
        <option value="semantic">Semantic (facts)</option>
        <option value="episodic">Episodic (events)</option>
      </select>
      <label><input type="checkbox" id="history-toggle"> show history</label>
      <button class="btn ghost" id="reflect-btn" title="Review recent episodes and distill higher-order insights">✨ Reflect</button>
      <button class="btn danger" id="clear-btn">Clear user</button>
    </div>
    <div class="mode-note" id="mode-note"></div>
    <div id="mem-list"></div>
  </section>

  <section id="tab-add">
    <div class="card">
      <textarea id="add-text" placeholder="What should the agent remember?&#10;e.g.  user: I'm Sachin, I prefer answers with Python examples."></textarea>
      <div class="add-row">
        <label><input type="checkbox" id="add-infer" checked>
          extract durable facts with Gemini</label>
        <div class="spacer"></div>
        <button class="btn" id="add-btn">Remember</button>
      </div>
      <div id="add-result"></div>
    </div>
  </section>

  <section id="tab-activity">
    <div class="card">
      <div class="toolbar" style="margin-bottom:6px">
        <span class="mode-note" style="margin:0">Every memory operation, with the
          LLM's reasoning — the glass-box audit trail.</span>
        <div class="spacer"></div>
        <button class="btn ghost" id="audit-refresh">Refresh</button>
      </div>
      <div id="audit-list"></div>
    </div>
  </section>
</main>

<div id="overlay"></div>
<aside id="drawer">
  <div class="head">
    <span class="title">Memory details</span>
    <div class="spacer"></div>
    <button class="del" id="drawer-close" style="font-size:20px">✕</button>
  </div>
  <div class="scroll" id="drawer-body"></div>
</aside>

<div id="toast"></div>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g,
  (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const user = () => $("user-input").value.trim() || "default";
const fdate = (ts) => ts ? new Date(ts * 1000).toLocaleDateString() : "";
let history = [];
let hasKey = false;

async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: {"Content-Type": "application/json"}, ...opts,
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) { const e = new Error(data.error || res.statusText);
    e.missingKey = data.missing_key; throw e; }
  return data;
}

function toast(msg, ok = false) {
  const t = $("toast");
  t.textContent = msg;
  t.className = ok ? "show info" : "show";
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = "", 9000);
  t.onclick = () => t.className = "";
}

/* ---------- header / health ---------- */
async function loadHealth() {
  try {
    const h = await api("/api/health");
    hasKey = h.has_key;
    const archived = h.stats.archived ? ` (+${h.stats.archived} archived)` : "";
    $("db-badge").textContent = `${h.db_path} · ${h.stats.total} memories${archived}`;
    const kb = $("key-badge");
    if (h.has_key) { kb.textContent = "Gemini connected"; kb.className = "badge ok"; }
    else { kb.textContent = "no API key — browse only"; kb.className = "badge warn";
           kb.title = "Run 'memlayer init' in a terminal, then restart the UI."; }
    $("user-list").innerHTML =
      h.users.map((u) => `<option value="${esc(u)}">`).join("");
  } catch (e) { toast(e.message); }
}

/* ---------- tabs ---------- */
document.querySelectorAll("nav button").forEach((btn) => {
  btn.onclick = () => {
    document.querySelectorAll("nav button").forEach((b) => b.classList.remove("active"));
    document.querySelectorAll("main section").forEach((s) => s.classList.remove("active"));
    btn.classList.add("active");
    $("tab-" + btn.dataset.tab).classList.add("active");
    if (btn.dataset.tab === "memories") loadMemories();
    if (btn.dataset.tab === "activity") loadAudit();
    if (btn.dataset.tab === "chat") $("chat-input").focus();
  };
});

/* ---------- chat ---------- */
function bubble(role, text) {
  $("chat-empty")?.remove();
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.textContent = text;
  $("chat-log").appendChild(div);
  $("chat-log").scrollTop = $("chat-log").scrollHeight;
  return div;
}

function recallNote(recalled) {
  if (!recalled || !recalled.length) return;
  const d = document.createElement("details");
  d.className = "recall";
  const rows = recalled.map((r) => `
    <div class="recall-item" data-id="${esc(r.id)}">
      <span>${esc(r.content)}</span>
      <span class="scores">sim ${r.similarity.toFixed(2)} · ret ${r.retention.toFixed(2)}
        · imp ${r.importance.toFixed(2)} · str ${r.strength.toFixed(1)}</span>
    </div>`).join("");
  d.innerHTML = `<summary>🧠 recalled ${recalled.length}
    memor${recalled.length === 1 ? "y" : "ies"} — click to see why</summary>${rows}`;
  d.querySelectorAll(".recall-item").forEach((el) => {
    el.style.cursor = "pointer";
    el.onclick = () => openDrawer(el.dataset.id);
  });
  $("chat-log").appendChild(d);
  $("chat-log").scrollTop = $("chat-log").scrollHeight;
}

async function sendChat() {
  const input = $("chat-input");
  const message = input.value.trim();
  if (!message) return;
  input.value = "";
  input.disabled = $("chat-send").disabled = true;
  bubble("user", message);
  const typing = bubble("agent typing", "thinking…");
  try {
    const r = await api("/api/chat", {
      method: "POST",
      body: JSON.stringify({message, history, user: user()}),
    });
    typing.remove();
    recallNote(r.recalled);
    bubble("agent", r.reply);
    history.push({role: "user", content: message},
                 {role: "assistant", content: r.reply});
    loadHealth();
  } catch (e) {
    typing.remove();
    bubble("agent", "(error — see message below)");
    toast(e.message);
  } finally {
    input.disabled = $("chat-send").disabled = false;
    input.focus();
  }
}
$("chat-send").onclick = sendChat;
$("chat-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendChat();
});

/* ---------- memories ---------- */
function typeChip(m) {
  const cls = m.category === "insight" ? "insight" : m.memory_type;
  const label = m.category === "insight" ? "insight" : m.memory_type;
  return `<span class="chip ${cls}">${esc(label)}</span>`;
}

function memCard(m) {
  const superseded = m.valid_until != null;
  const score = m.score !== undefined
    ? `<span class="score">${m.score.toFixed(3)}</span>` : "";
  const cat = (m.category && m.category !== "insight")
    ? `<span class="chip cat">${esc(m.category)}</span>` : "";
  const oldChip = superseded
    ? `<span class="chip old">superseded ${fdate(m.valid_until)}</span>` : "";
  return `<div class="mem ${superseded ? "superseded" : ""}" data-id="${esc(m.id)}">
    <div class="body">
      <div class="content">${esc(m.content)}</div>
      <div class="meta">
        ${typeChip(m)} ${cat} ${oldChip}
        <span>${fdate(m.updated_at)}</span>
        <span class="bar" title="importance ${m.importance}">
          <i style="width:${Math.round(m.importance * 100)}%"></i></span>
        <span class="bar ret" title="retention ${m.retention} (forgetting curve)">
          <i style="width:${Math.round((m.retention ?? 1) * 100)}%"></i></span>
        ${m.access_count ? `<span>recalled ${m.access_count}×</span>` : ""}
        ${score}
      </div>
    </div>
    <button class="del" title="forget this memory">✕</button>
  </div>`;
}

async function loadMemories() {
  const q = $("search-input").value.trim();
  const type = $("type-filter").value;
  try {
    const params = new URLSearchParams({user: user(), limit: "100"});
    if (q) params.set("q", q);
    if (type) params.set("type", type);
    if ($("history-toggle").checked) params.set("history", "1");
    const r = await api("/api/memories?" + params);
    $("mem-count").textContent = `(${r.stats.total})`;
    $("mode-note").textContent =
      r.mode === "hybrid" ? "ranked by relevance · retention · importance — click a memory for its full story" :
      r.mode === "keyword" ? "keyword match only (no API key for semantic search)" :
      "most recently updated first — click a memory for its full story";
    $("mem-list").innerHTML = r.items.length
      ? r.items.map(memCard).join("")
      : `<div class="empty">${q ? "No memories match that search."
          : "No memories yet for this user. Try the Chat or Add tab."}</div>`;
    document.querySelectorAll(".mem").forEach((card) => {
      card.querySelector(".del").onclick = async (ev) => {
        ev.stopPropagation();
        try {
          await api("/api/memories/" + card.dataset.id, {method: "DELETE"});
          card.remove();
          loadHealth();
        } catch (e) { toast(e.message); }
      };
      card.onclick = () => openDrawer(card.dataset.id);
    });
  } catch (e) { toast(e.message); }
}

let searchTimer;
$("search-input").addEventListener("input", () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadMemories, 350);
});
$("type-filter").onchange = loadMemories;
$("history-toggle").onchange = loadMemories;
$("clear-btn").onclick = async () => {
  if (!confirm(`Delete ALL memories for user '${user()}'?`)) return;
  try {
    const r = await api("/api/clear", {method: "POST",
      body: JSON.stringify({user: user()})});
    toast(`Deleted ${r.deleted} memories.`, true);
    loadMemories(); loadHealth();
  } catch (e) { toast(e.message); }
};

$("reflect-btn").onclick = async () => {
  const btn = $("reflect-btn");
  btn.disabled = true; btn.textContent = "✨ Reflecting…";
  try {
    const r = await api("/api/reflect", {method: "POST",
      body: JSON.stringify({user: user()})});
    toast(r.insights.length
      ? `Reflection found ${r.insights.length} insight(s) across ${r.examined_episodes} episodes.`
      : `Reflected on ${r.examined_episodes} episodes — no new insights (that's normal).`,
      true);
    loadMemories(); loadHealth();
  } catch (e) { toast(e.message); }
  finally { btn.disabled = false; btn.textContent = "✨ Reflect"; }
};

/* ---------- memory drawer (glass-box) ---------- */
async function openDrawer(id) {
  try {
    const h = await api(`/api/memories/${id}/history`);
    const rec = h.record;
    const versions = h.versions.map((v) => `
      <div class="version ${v.valid_until == null ? "current" : ""}">
        ${esc(v.content)}
        <div class="tag">${v.valid_until == null
          ? "current since " + fdate(v.valid_from)
          : "held " + fdate(v.valid_from) + " → " + fdate(v.valid_until)}</div>
      </div>`).join("");
    const sources = h.sources.map((s) => `
      <div class="src">(${fdate(s.created_at)}) ${esc(s.content)}</div>`).join("");
    const audit = h.audit.map((a) => `
      <div class="audit-row">
        <span class="when">${fdate(a.ts)}</span>
        <span class="audit-action ${esc(a.action)}">${esc(a.action)}</span>
        <span class="why">${esc(a.reasoning || "")}</span>
      </div>`).join("");
    $("drawer-body").innerHTML = `
      <div class="fact">${esc(rec.content)}</div>
      <div class="meta" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;
           font-size:12.5px;color:var(--muted)">
        ${typeChip(rec)}
        ${rec.category ? `<span class="chip cat">${esc(rec.category)}</span>` : ""}
        <span>importance ${rec.importance}</span>
        <span>strength ${rec.strength.toFixed(2)}</span>
        <span>retention ${h.retention}</span>
        <span>recalled ${rec.access_count}×</span>
      </div>
      ${h.versions.length > 1 ? `<h4 class="sub">Belief timeline</h4>${versions}` : ""}
      ${sources ? `<h4 class="sub">Derived from (evidence)</h4>${sources}` : ""}
      ${audit ? `<h4 class="sub">Audit trail</h4>${audit}` : ""}
    `;
    $("drawer").classList.add("open");
    $("overlay").classList.add("open");
  } catch (e) { toast(e.message); }
}
function closeDrawer() {
  $("drawer").classList.remove("open");
  $("overlay").classList.remove("open");
}
$("drawer-close").onclick = closeDrawer;
$("overlay").onclick = closeDrawer;
document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeDrawer(); });

/* ---------- add ---------- */
$("add-btn").onclick = async () => {
  const content = $("add-text").value.trim();
  if (!content) return;
  $("add-btn").disabled = true;
  try {
    const r = await api("/api/memories", {
      method: "POST",
      body: JSON.stringify({content, user: user(), infer: $("add-infer").checked}),
    });
    if (r.skipped_private) {
      $("add-result").style.display = "block";
      $("add-result").innerHTML = `<h4 class="sub">Not stored</h4>
        <div class="fact">This looked like something you asked not to be
        remembered ("off the record"), so nothing was saved.
        <div class="action">privacy guard</div></div>`;
      return;
    }
    const facts = (r.facts || []).map((f) => {
      const ops = (f.operations || []);
      const action = f.updated.length ? "updated existing fact"
        : f.deleted.length ? "replaced obsolete fact"
        : f.skipped ? "already known" : "new fact";
      const why = ops.map((o) => o.reasoning).filter(Boolean).join(" · ");
      return `<div class="fact">${esc(f.content)}
        <div class="action">${action}${why ? " — " + esc(why) : ""}</div></div>`;
    }).join("");
    const redacted = r.redacted
      ? `<div class="fact">PII redacted before storage:
         ${esc(Object.entries(r.redacted).map(([k, v]) => `${k}×${v}`).join(", "))}
         <div class="action">privacy guard</div></div>` : "";
    $("add-result").style.display = "block";
    $("add-result").innerHTML = `<h4 class="sub">Stored</h4>
      <div class="fact">${esc(content)}<div class="action">episodic memory</div></div>
      ${redacted}
      ${facts ? `<h4 class="sub">Facts extracted</h4>` + facts
              : "<div class='mode-note'>no durable facts extracted</div>"}`;
    $("add-text").value = "";
    loadHealth();
  } catch (e) { toast(e.message); }
  finally { $("add-btn").disabled = false; }
};

/* ---------- activity ---------- */
async function loadAudit() {
  try {
    const r = await api(`/api/audit?user=${encodeURIComponent(user())}&limit=80`);
    $("audit-list").innerHTML = r.entries.length
      ? r.entries.map((a) => `
        <div class="audit-row">
          <span class="when">${fdate(a.ts)}</span>
          <span class="audit-action ${esc(a.action)}">${esc(a.action)}</span>
          <span class="why">${esc(a.reasoning ||
            (a.detail && (a.detail.content || a.detail.new_content ||
             a.detail.insight)) || "")}</span>
        </div>`).join("")
      : `<div class="empty">No activity yet for this user.</div>`;
  } catch (e) { toast(e.message); }
}
$("audit-refresh").onclick = loadAudit;

/* ---------- user switching ---------- */
$("user-input").addEventListener("change", () => {
  history = [];
  $("chat-log").innerHTML =
    `<div class="empty" id="chat-empty">Switched to user '${esc(user())}'.</div>`;
  loadMemories(); loadHealth(); loadAudit();
});

loadHealth();
loadMemories();
</script>
</body>
</html>
